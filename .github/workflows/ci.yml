# =============================================================
# CI Pipeline — MLOps ICP Prediction
# Stage: Code Quality & Unit Testing (pre-MLflow)
# Trigger: push / pull_request on any branch
# =============================================================

name: CI Pipeline

on:
  push:
    branches: ["**"]          # trigger on every branch push
  pull_request:
    branches: ["**"]          # trigger on every PR target

# ── Global defaults ──────────────────────────────────────────
env:
  PYTHONPATH: ${{ github.workspace }}/src  # expose src/ to all test imports

jobs:

  # ─────────────────────────────────────────────────────────
  # JOB 1 · lint  — fast static checks (ruff, no install weight)
  # ─────────────────────────────────────────────────────────
  lint:
    name: Lint and Style Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff (lightweight linter)
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check src/ tests/ --output-format=github

  # ─────────────────────────────────────────────────────────
  # JOB 2 · test  — dependency install + pytest
  # ─────────────────────────────────────────────────────────
  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint          # only run tests when lint passes

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]   # test on two stable releases

    steps:
      # ── Step 1: Source code ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Python runtime ───────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"              # cache pip wheel downloads between runs

      # ── Step 3: Dependencies ─────────────────────────────
      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 4: Unit tests ───────────────────────────────
      - name: Run pytest with coverage report
        run: |
          pytest tests/ \
            --tb=short \
            --strict-markers \
            -v \
            --junitxml=reports/junit.xml \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage.xml

      # ── Step 5: Publish test & coverage artifacts ────────
      - name: Upload test reports
        if: always()              # upload even when tests fail
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-py${{ matrix.python-version }}
          path: reports/
          retention-days: 14

  # ─────────────────────────────────────────────────────────
  # JOB 3 · validate-dvc  — ensure DVC metadata is consistent
  # ─────────────────────────────────────────────────────────
  validate-dvc:
    name: Validate DVC Metadata
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install DVC
        run: pip install dvc

      - name: Check DVC status (local only — no remote pull)
        run: |
          dvc status --no-updates 2>&1 || true
          echo "DVC metadata check complete."

  # ─────────────────────────────────────────────────────────
  # JOB 4 · ci-summary  — single required gate for branch protection
  # ─────────────────────────────────────────────────────────
  ci-summary:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [lint, test, validate-dvc]
    if: always()

    steps:
      - name: Evaluate overall CI result
        run: |
          if [[ "${{ needs.lint.result }}"         == "success" &&
                "${{ needs.test.result }}"         == "success" &&
                "${{ needs.validate-dvc.result }}" == "success" ]]; then
            echo "All CI jobs passed."
          else
            echo "One or more CI jobs failed."
            echo "  lint:         ${{ needs.lint.result }}"
            echo "  test:         ${{ needs.test.result }}"
            echo "  validate-dvc: ${{ needs.validate-dvc.result }}"
            exit 1
          fi
